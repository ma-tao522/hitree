# 数据库驱动
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# 数据库连接的URL
spring.datasource.url=jdbc:mysql://localhost:3306/hitree?allowPublicKeyRetrieval=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC&rewriteBatchedStatements=true&useAffectedRows=true
# 数据库账号
spring.datasource.username=root
# 数据库密码
spring.datasource.password=258000

# 配置mapper.xml文件的存放位置
mybatis.mapper-locations=classpath:mapper/*.xml
# 开启驼峰命名转换
mybatis.configuration.map-underscore-to-camel-case=true

mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl